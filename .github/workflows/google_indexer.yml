name: Auto-Index New PDFs

# 1. THE TRIGGER: This tells GitHub to only run this action when a push happens
# specifically inside the "sports" folder and only for .pdf files.
on:
  push:
    paths:
      - 'sports/**/*.pdf'

jobs:
  index_urls:
    runs-on: ubuntu-latest

    steps:
      # 2. CHECKOUT: Pulls the latest code from the repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Fetches the last two commits to compare changes

      # 3. SETUP: Prepares the server with Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # 4. DEPENDENCIES: Installs necessary libraries (like google-auth)
      - name: Install Dependencies
        run: pip install requests google-auth google-auth-httplib2 google-api-python-client

      # 5. EXECUTION: Runs the Python script, passing the hidden credentials securely
      - name: Run Indexing API Script
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python indexer.py
